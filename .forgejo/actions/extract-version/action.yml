name: Extract Cargo Version
description: Extract the package version from Cargo.toml via cargo metadata.

outputs:
  version:
    description: The extracted semver version string (e.g. 1.2.3).
    value: ${{ steps.extract.outputs.VERSION }}

runs:
  using: composite
  steps:
    - name: Extract version
      id: extract
      shell: bash
      run: |
        VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
        if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
          echo "Could not extract version from Cargo.toml"
          exit 1
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Extracted version: $VERSION"
