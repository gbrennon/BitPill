name: Release Preflight

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  preflight:
    if: startsWith(forgejo.head_ref, 'release/')
    runs-on: codeberg-medium

    steps:
      - uses: ./.forgejo/actions/setup-rust
        with:
          fetch-depth: '0'

      - uses: ./.forgejo/actions/install-git-cliff

      - uses: ./.forgejo/actions/extract-version
        id: version

      - name: Validate branch name matches version
        env:
          BRANCH: ${{ forgejo.head_ref }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          EXPECTED="release/$VERSION"

          if [ "$BRANCH" != "$EXPECTED" ]; then
            echo "Branch name '$BRANCH' does not match expected '$EXPECTED'"
            exit 1
          fi

      - uses: ./.forgejo/actions/validate-release
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Dry-run publish to crates.io
        run: |
          set -euo pipefail
          cargo publish --dry-run --locked
