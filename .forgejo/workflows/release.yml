name: Release

on:
  pull_request:
    branches:
      - main
    types: [closed]

permissions:
  contents: write

jobs:
  release:
    if: forgejo.event.pull_request.merged == true && startsWith(forgejo.event.pull_request.head_ref, 'release/')
    runs-on: codeberg-medium

    steps:
      - uses: actions/checkout@v6

      - uses: ./.forgejo/actions/setup-rust

      - uses: ./.forgejo/actions/install-git-cliff

      - uses: ./.forgejo/actions/extract-version
        id: version

      - uses: ./.forgejo/actions/validate-release
        with:
          version: ${{ steps.version.outputs.version }}

      - uses: ./.forgejo/actions/generate-release-notes
        id: notes

      - uses: ./.forgejo/actions/create-tag
        id: tag
        with:
          version: ${{ steps.version.outputs.version }}

      - name: Create Forgejo release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          repo: ${{ secrets.REPO_OWNER }}/${{ secrets.REPO_NAME }}
          tag: ${{ steps.tag.outputs.tag }}
          release-notes-file: ${{ steps.notes.outputs.file }}

      - uses: ./.forgejo/actions/publish-crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
