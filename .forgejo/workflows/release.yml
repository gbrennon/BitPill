name: Release

on:
  pull_request:
    branches:
      - main
    types: [closed]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: codeberg-medium
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: wackbyte/rust-toolchain@trunk
        with:
          toolchain: stable

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Install git-cliff
        run: |
          mkdir -p ~/.local/bin
          curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --strip-components=1 -C ~/.local/bin git-cliff-*/git-cliff
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Extract version
        id: version
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          git-cliff --config cliff.toml --output CHANGELOG.md
          cat CHANGELOG.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit changelog
        run: |
          git config --local user.email "forgejo-actions[bot]@noreply.codeberg.org"
          git config --local user.name "forgejo-actions[bot]"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update changelog"
          git push

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Create Forgejo release
        run: |
          CHANGELOG=$(cat CHANGELOG.md)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.FORGEJO_API_URL }}/repos/${{ secrets.FORGEJO_OWNER }}/${{ secrets.FORGEJO_REPO }}/releases" \
            -d "{
              \"tag_name\": \"v${{ steps.version.outputs.VERSION }}\",
              \"name\": \"v${{ steps.version.outputs.VERSION }}\",
              \"body\": $(echo "$CHANGELOG" | jq -Rs .),
              \"draft\": true
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          [ "$HTTP_CODE" = "201" ] || { echo "Forgejo release failed: $HTTP_CODE"; exit 1; }

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish
