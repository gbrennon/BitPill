name: Release

on:
  pull_request:
    branches:
      - main
    types: [closed]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: codeberg-medium
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: https://code.forgejo.org/msrd0/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Install git-cliff
        run: |
          mkdir -p ~/.local/bin
          curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --strip-components=1 -C ~/.local/bin git-cliff-*/git-cliff
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Extract version
        id: version
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          git-cliff --config cliff.toml --output CHANGELOG.md
          cat CHANGELOG.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit changelog
        run: |
          git config --local user.email "forgejo-actions[bot]@noreply.codeberg.org"
          git config --local user.name "forgejo-actions[bot]"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update changelog"
          git push

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.VERSION }}" 2>/dev/null || echo "Tag already exists, skipping"
          git push origin "v${{ steps.version.outputs.VERSION }}" || echo "Tag already on remote, skipping"

      - name: Generate release notes
        run: |
          git-cliff --config cliff.toml --current --strip header > /tmp/release-notes.md

      - name: Create Forgejo release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          url: ${{ secrets.FORGEJO_API_URL }}
          repo: ${{ secrets.FORGEJO_OWNER }}/${{ secrets.FORGEJO_REPO }}
          token: ${{ secrets.FORGEJO_TOKEN }}
          tag: v${{ steps.version.outputs.VERSION }}
          release-notes-file: /tmp/release-notes.md

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish
