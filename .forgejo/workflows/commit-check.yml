name: Check Commit Messages

on: [push, pull_request]

jobs:
  check-commits:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure full history
        run: bash scripts/ensure_full_history.sh

      - name: Check commit messages
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BASE_REF: ${{ github.event.pull_request.base.ref }}
          CI_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: bash scripts/check_commit_messages.sh
