name: sync-to-github

on:
  push:
    branches: ["**"]
    tags: ["*"]

jobs:
  sync:
    runs-on: codeberg-medium
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitHub
        env:
          GITHUB_URL: https://${{ secrets.SOURCE_SYNC_USER }}:${{ secrets.SOURCE_SYNC_TOKEN }}@github.com/${{ secrets.SOURCE_SYNC_USER }}/${{ secrets.SOURCE_SYNC_REPO }}.git
        run: |
          set -euo pipefail
          git push "$GITHUB_URL" --mirror

  create-github-release:
    runs-on: codeberg-medium
    needs: sync
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.forgejo/actions/install-git-cliff

      - name: Generate release notes
        run: |
          set -euo pipefail
          git fetch --tags --force
          git-cliff --config cliff.toml --current --strip header > /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.SOURCE_SYNC_TOKEN }}
          GH_REPO: ${{ secrets.SOURCE_SYNC_USER }}/${{ secrets.SOURCE_SYNC_REPO }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release already exists, skipping"
            exit 0
          fi

          gh release create "$TAG" \
            --repo "$GH_REPO" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md
