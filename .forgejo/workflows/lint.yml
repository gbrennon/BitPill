name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/scripts/setup.sh') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bin-

      - name: CI setup
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/setup.sh

      - name: Check formatting
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          just fmt-check

      - name: Lint
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          just lint
