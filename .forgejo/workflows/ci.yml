name: CI

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**

permissions:
  contents: read

jobs:
  test:
    runs-on: codeberg-medium
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-target-

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/scripts/setup.sh') }}
          restore-keys: ${{ runner.os }}-cargo-bin-

      - name: CI setup
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/setup.sh

      - name: Run tests
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          just test

      - name: Show coverage report
        if: always()
        run: bash scripts/show_coverage_report.sh

  lint:
    runs-on: codeberg-medium
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/scripts/setup.sh') }}
          restore-keys: ${{ runner.os }}-cargo-bin-

      - name: CI setup
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/setup.sh

      - name: Check formatting
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          just fmt-check

      - name: Lint
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          just lint

  validate:
    runs-on: codeberg-medium
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellCheck

      - name: Install actionlint
        run: |
          mkdir -p ~/.local/bin
          curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          mv actionlint ~/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Lint shell scripts
        run: |
          find scripts/ -name "*.sh" -print0 | xargs -0 shellcheck --external-sources

      - name: Lint Forgejo Actions workflows
        run: |
          shopt -s nullglob
          actionlint .forgejo/workflows/*.yml
