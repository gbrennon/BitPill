name: CI

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**

permissions:
  contents: read

jobs:
  test:
    runs-on: codeberg-medium
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6

      - uses: ./.forgejo/actions/setup-rust

      - name: Cache cargo target
        uses: https://data.forgejo.org/actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-target-

      - name: Cache cargo bin
        uses: https://data.forgejo.org/actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/scripts/setup.sh') }}
          restore-keys: ${{ runner.os }}-cargo-bin-

      - name: CI setup
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/setup.sh

      - name: Run tests
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          just test

      - name: Show coverage report
        if: always()
        run: |
          if [ -f scripts/show_coverage_report.sh ]; then
            bash scripts/show_coverage_report.sh
          else
            echo "Coverage report script not found, skipping"
          fi

  lint:
    runs-on: codeberg-medium
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6

      - uses: ./.forgejo/actions/setup-rust
        with:
          toolchain: nightly

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ hashFiles('**/scripts/setup.sh') }}
          restore-keys: ${{ runner.os }}-cargo-bin-

      - name: CI setup
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/setup.sh

      - name: Check formatting
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          just fmt-check

      - name: Lint
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          just lint

  validate:
    runs-on: codeberg-medium
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: |
          mkdir -p ~/.local/bin
          curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          mv actionlint ~/.local/bin/

      - name: Lint shell scripts
        run: |
          for f in scripts/*.sh scripts/lib/*.sh; do shellcheck --external-sources -S info "$f"; done

      - name: Lint Forgejo Actions workflows
        run: |
          PATH="$HOME/.local/bin:$PATH"
          actionlint -config-file .actionlint.yaml .forgejo/workflows/*.yml
