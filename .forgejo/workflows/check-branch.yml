name: Check Branch Name

on: [push, pull_request]

jobs:
  check-branch:
    runs-on: codeberg-medium
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check branch name
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_HEAD_REF: ${{ github.head_ref }}
          CI_REF: ${{ github.ref }}
        run: bash scripts/check_branch_name.sh
