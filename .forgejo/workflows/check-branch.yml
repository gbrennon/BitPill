name: Check Branch Name

on: [push, pull_request]

jobs:
  check-branch:
    runs-on: codeberg-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check branch name
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: bash scripts/check_branch_name.sh
