name: PR Automation
on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  enrich-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-assign author
        uses: toshimaru/auto-author-assign@v3.0.1

      - name: Build conventional commit summary and update PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          declare -A SECTIONS
          TYPES=("feat" "fix" "refactor" "perf" "test" "chore" "docs" "ci" "build")
          LABELS=("Features" "Bug Fixes" "Refactoring" "Performance" "Tests" "Chores" "Docs" "CI" "Build")

          COMMITS=$(git log ${BASE}..${HEAD} --pretty=format:"%s" --no-merges)

          BODY=""
          for i in "${!TYPES[@]}"; do
            TYPE="${TYPES[$i]}"
            LABEL="${LABELS[$i]}"
            MATCHES=$(echo "$COMMITS" | grep -E "^${TYPE}(\(.+\))?(!)?:" | sed 's/^/- /')
            if [ -n "$MATCHES" ]; then
              BODY="${BODY}### ${LABEL}\n${MATCHES}\n\n"
            fi
          done

          # Catch anything that didn't match a known type
          UNCATEGORIZED=$(echo "$COMMITS" | grep -vE "^(feat|fix|refactor|perf|test|chore|docs|ci|build)(\(.+\))?(!)?:" | sed 's/^/- /')
          if [ -n "$UNCATEGORIZED" ]; then
            BODY="${BODY}### Other\n${UNCATEGORIZED}\n\n"
          fi

          gh pr edit $PR_NUMBER --body "$(printf "$BODY")"
