# BitPill lefthook configuration
# Install: pipx install lefthook && lefthook install

pre-commit:
  parallel: false
  jobs:
    - name: Auto-fix fmt, lint, and warnings
      run: |
        just fmt
        just lint-fix
        cargo fix --lib -p bitpill --allow-dirty --allow-staged

    - name: Verify no auto-fixes needed
      run: "git diff --quiet || { echo 'ERROR: Auto-fixed files must be staged. Run: git add -A && git commit --amend --no-edit'; exit 1; }"
